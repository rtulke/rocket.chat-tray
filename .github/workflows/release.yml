name: Release

# build+verify run on every push/PR to main so packaging breakage is caught
# early; the release job only fires on an actual "vX.Y.Z" tag push.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NFPM_VERSION: "2.47.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian12
            image: debian:12
          - id: debian13
            image: debian:13
          - id: ubuntu2404
            image: ubuntu:24.04
          - id: ubuntu2604
            image: ubuntu:26.04
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      # actions/checkout shells out to git, which isn't present in the bare
      # distro images used as build containers -- install it (and the venv
      # toolchain packaging/build-venv.sh needs) before checking out.
      - name: Install build prerequisites
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            git python3 python3-venv python3-pip curl ca-certificates

      - uses: actions/checkout@v4

      - name: Determine package version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('rocketchat_tray/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Builds a real venv inside *this* container, so the resulting
      # package's bundled Python environment matches this exact distro's
      # system Python -- see packaging/build-venv.sh for why that matters
      # (a venv isn't relocatable across differing Python versions).
      - name: Build bundled virtualenv (includes PySide6)
        run: bash packaging/build-venv.sh ./stage

      - name: Install nfpm
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            -o /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          chmod +x /usr/local/bin/nfpm

      - name: Build .deb
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          nfpm package -f packaging/nfpm.yaml -p deb \
            -t "rocketchat-tray_${PKG_VERSION}_${{ matrix.id }}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.id }}
          path: rocketchat-tray_*.deb
          if-no-files-found: error

  verify:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian12
            image: debian:12
          - id: debian13
            image: debian:13
          - id: ubuntu2404
            image: ubuntu:24.04
          - id: ubuntu2604
            image: ubuntu:26.04
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deb-${{ matrix.id }}

      # A real `apt-get install`, not `dpkg -i`, so declared dependencies
      # actually have to resolve against this distro's package archive --
      # that's the whole point of building per-distro in the first place.
      - name: Install the package the same way an end user would
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ./rocketchat-tray_*.deb

      # No display/D-Bus session is available in a headless CI container,
      # so this stops short of actually starting the tray app (that's
      # covered by manual testing on a real GNOME session) -- it proves the
      # package installed cleanly and the bundled environment is intact:
      # right files in place, our package and PySide6 both importable.
      - name: Smoke-test the installed package
        run: |
          test -x /usr/bin/rocketchat-tray
          test -f /etc/rocketchat-tray/config.ini
          test -f /etc/xdg/autostart/rocketchat-tray.desktop
          /opt/rocketchat-tray/venv/bin/python3 -c "import rocketchat_tray; print('version:', rocketchat_tray.__version__)"
          /opt/rocketchat-tray/venv/bin/python3 -c "from PySide6.QtWidgets import QApplication"

  release:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          sha256sum *.deb > SHA256SUMS
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Rocket.Chat Tray $GITHUB_REF_NAME" \
            * \
          || gh release upload "$GITHUB_REF_NAME" * \
            --repo "$GITHUB_REPOSITORY" --clobber
